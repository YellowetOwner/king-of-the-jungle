<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whitet Packs</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #d1d8ec, #f1f3fb);
      font-family: Arial, sans-serif;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px;
      padding: 40px;
    }

    .pack {
      width: 300px;
      height: 300px;
      background-color: #fff;
      border-radius: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .pack::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent);
      z-index: 1;
    }

    .pack:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.25);
    }

    .pack img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeIn 0.3s ease-in-out;
    }

    .opening-animation {
      width: 300px;
      height: 300px;
      background: #fff;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: bold;
      color: #333;
      box-shadow: 0 0 40px 10px gold;
      animation: popOpen 0.6s ease-out, pulse 1.5s infinite ease-in-out, lootShake 1s infinite ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }

    @keyframes popOpen {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px 10px gold; }
      50% { box-shadow: 0 0 60px 20px orange; }
    }

    @keyframes lootShake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: rotate(3deg); }
      20% { transform: rotate(-3deg); }
      30% { transform: rotate(2deg); }
      40% { transform: rotate(-2deg); }
      50% { transform: rotate(1deg); }
      60% { transform: rotate(-1deg); }
    }
  </style>
</head>
