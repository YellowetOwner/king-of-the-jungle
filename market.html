<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market | Whitet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <script src="https://code.jquery.com/jquery-3.6.3.min.js" type="text/javascript"></script>
  <script src="/scripts/themes.js"></script>
  <script src="scripts/preload.js"></script>
  <script src="scripts/market.js"></script>
  <script src="scripts/news.js"></script>
  <script src="/scripts/all.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="shortcut icon" href="/images/logo.png" />
</head>
<body>
  <div class="preloader">
    <img src="images/logo.png" alt="Preloader Image" class="preloader-image" />
  </div>
  <div class="styles__background___2J-JA-camelCase">
    <div class="styles__blooksBackground___3oQ7Y-camelCase" style="
      background-image: url('/images/ui7.png');
      animation: animatedBackground 9s linear infinite;
    "></div>
  </div>

  <div class="styles__mNavBar___1OUuw-camelCase">
    <a href="/" class="styles__blooketText___1pMBG-camelCase">Whitet</a>
    <i class="fas fa-bars styles__mHamburgerIcon___2Q8oG-camelCase" id="hamburgerToggle"></i>
  </div>
  <div class="styles__mSidebar___3J45k-camelCase" id="mobileSidebar">
    <i class="fas fa-times styles__closeIcon___39zL7-camelCase" id="closeSidebar"></i>
    <div class="nothin"></div>
    <div class="styles__bottomRow___3OozA-camelCase"></div>
  </div>

  <div class="styles__topRightRow___dQvxc-camelCase">
    <div class="styles__tokenBalance___1FHgT-camelCase">
      <img src="https://cdn.glitch.global/4a56c526-58a9-49fe-a2c0-954e54e4ad06/whitetoken2.png" alt="Token" class="styles__tokenBalanceIcon___3MGhs-camelCase" draggable="false" />
      <div id="tokenbalance" style="color: black;">0</div>
    </div>
    <div class="styles__profileContainer___CSuIE-camelCase" role="button" tabindex="0">
      <div class="styles__profileRow___cJa4E-camelCase">
        <div style="position: relative;" class="styles__blookContainer___36LK2-camelCase styles__profileBlook___37mfP-camelCase">
          <img src="images/logo.png" id="pfpimg" draggable="false" class="styles__blook___1R6So-camelCase" />
        </div>
        <text class="usertxt" id="usernamedrop">user</text>
      </div>
      <i class="fas fa-angle-down styles__profileDropdownIcon___3iLIX-camelCase"></i>
      <div class="styles__profileDropdownMenu___2jUAA-camelCase">
        <a class="styles__profileDropdownOption___ljZXD-camelCase" href="/logout">
          <i class="fas fa-sign-out-alt styles__profileDropdownOptionIcon___15VKX-camelCase"></i>Logout
        </a>
      </div>
    </div>
  </div>

  <div class="styles__sidebar___1XqWi-camelCase">
    <a href="/" class="styles__blooketText___1pMBG-camelCase">Whitet</a>
    <div class="nothin"></div>
    <div class="styles__bottomRow___3OozA-camelCase"></div>
  </div>

  <div class="arts__profileBody___eNPbH-camelCase">
    <div class="styles__header___153FZ-camelCase">Market</div>
    <div class="styles__leftColumn___2MTgv-camelCase">
      <div id="packswrapper" class="styles__packsWrapper___2hBF4-camelCase"></div>
    </div>
  </div>

  <div class="styles__storeContainer___FgOVv-camelCase">
    <img id="phill" src="images/blooks/og/brp.webp" alt="Phill the Cashier" class="styles__cashierBlook___iI1UH-camelCase" draggable="false" />
    <img id="market" src="images/market.webp" alt="Store" class="styles__storeImg___2c3cG-camelCase" draggable="false" />
    <div class="styles__instantButton___2ezEk-camelCase" id="instantOpen" role="button">Instant Open: Off</div>
  </div>

  <div id="particles-container"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("hamburgerToggle").onclick = () => document.getElementById("mobileSidebar").style.display = "flex";
      document.getElementById("closeSidebar").onclick = () => document.getElementById("mobileSidebar").style.display = "none";
    });
  </script>

  <script>
    const getImageSrc = () => {
      const randomNumber = Math.floor(Math.random() * 100);
      if (randomNumber === 0) return "images/blooks/Triangle.webp";
      if (randomNumber < 10) return "images/blooks/og/brp.webp";
      return "images/coolmark.webp";
    };
    document.getElementById("phill").src = getImageSrc();

    function createPackContainer(name, price, imageUrl, color) {
      const container = document.createElement("div");
      container.className = "styles__packContainer___3RwSU-camelCase";
      container.style.background = color;
      const imgC = document.createElement("div");
      imgC.className = "styles__packImgContainer___3NABW-camelCase";
      const img = document.createElement("img");
      img.src = imageUrl;
      img.className = "styles__packImg___3to1S-camelCase";
      const shadow = document.createElement("img");
      shadow.src = imageUrl;
      shadow.className = "styles__packShadow___2TA17-camelCase";
      imgC.append(img, shadow);
      container.append(imgC);
      const bottom = document.createElement("div");
      bottom.className = "styles__packBottom___37drt-camelCase";
      const token = document.createElement("img");
      token.src = "https://cdn.glitch.global/4a56c526-58a9-49fe-a2c0-954e54e4ad06/whitetoken2.png";
      token.className = "styles__packPriceImg___1FaDF-camelCase";
      bottom.appendChild(token);
      const priceEl = document.createElement("span");
      priceEl.innerText = price;
      bottom.appendChild(priceEl);
      container.appendChild(bottom);
      return container;
    }

    async function onPackOpen(pack) {
      const data = await openPack(pack.name);
      if (data.blookEarned) {
        const { name, imageURL, rarity } = data.blookEarned;
        const sodaPack = (await getPacks()).find(p => p.name.toLowerCase() === "soda");
        let chance = sodaPack?.blooks.find(b => b.blook.name === name)?.chance ?? null;
        createPackOpening(data.blookEarned, sodaPack?.name || "Soda", chance, true);
      }
    }

    async function load() {
      const packs = await getPacks();
      const wrapper = document.getElementById("packswrapper");
      packs.forEach(pack => {
        const c = createPackContainer(pack.name, pack.cost, pack.imageURL, pack.color || "");
        c.addEventListener("click", () => onPackOpen(pack));
        wrapper.appendChild(c);
      });
    }
    load();
  </script>
</body>
</html>
