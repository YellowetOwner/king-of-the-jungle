<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Whitet is an 'all new' blooket private server owned by Trixter" />
  <title>Whitet</title>

  <link rel="shortcut icon" href="/images/logo.png" />
  <link rel="stylesheet" href="/css/main.css" />
  <link
    rel="stylesheet"
    href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css"
    crossorigin="anonymous"
  />

  <script src="/js" async></script>
  <script src="scripts/preload.js"></script>
  <script src="scripts/themes.js" defer></script>
</head>

<body>
  <div class="preloader">
    <img src="images/logo.png" alt="Preloader Image" class="preloader-image" />
  </div>

  <div class="styles__background___2J-JA-camelCase">
    <div
      class="styles__blooksBackground___3oQ7Y-camelCase"
      style="
        background-image: url('/images/ui7.png');
        animation: animatedBackground 9s linear infinite;
        -moz-animation: animatedBackground 9s linear infinite;
        -webkit-animation: animatedBackground 9s linear infinite;
        -ms-animation: animatedBackground 9s linear infinite;
        -o-animation: animatedBackground 9s linear infinite;
      "
    ></div>
  </div>

  <div class="headerContainer">
    <img
      style="filter: drop-shadow(0px 0px 5px black)"
      src="/images/homescreenblooks.webp"
      alt="Blooks"
      class="headerImage"
      draggable="false"
    />

    <div class="headerSide"></div>

    <div class="topHeaderContainer">
      <div class="logoText">Whitet</div>
    </div>

    <div class="welcomeContainer">
      <div class="welcomeText">
        We<br />
        Are So <br />
        Back
      </div>

      <div class="welcomeDesc">
        Whitet is an "all new" blooket private server owned by Trixter and
        programed by Glitch and Cool Duck in HTML, CSS, and JavaScript!
      </div>

      <a class="welcomeButton" href="/register"> Get Started </a>
      <a class="welcomeButton" href="https://discord.gg/Bvv6Qk4892"> Discord </a>

      <div
        class="pronounceButton"
        role="button"
        tabindex="0"
        onclick="new Audio('https://cdn.glitch.global/4a56c526-58a9-49fe-a2c0-954e54e4ad06/whieit.mp3?v=1743657646950').play()"
      >
        <i class="fas fa-volume-up" aria-hidden="true"></i> &nbsp;
        Pronunciation ("White-et")
      </div>
    </div>
  </div>

  <div class="topButtonContainer">
    <a class="top-button loginButton" href="/login"> Login </a>
    <a class="top-button signUpButton" href="/register"> Register </a>
  </div>
</body>
</html>
