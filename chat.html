<div id="typing-indicator" style="margin: -5px 0 10px 220px; padding-left: 20px; font-style: italic; color: black; font-size: 14px;"></div>
<div id="new-message" style="display:none; margin: -12px 0 10px 220px; padding-left: 400px; font-weight: bold; color: black; font-size: 18px; cursor: pointer;"></div>

<input type="file" id="fileInput" accept="image/*,video/*,audio/*" style="display: none;">

 <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import {
  getDatabase, ref, push, onChildAdded, set, remove,
  onValue, query, orderByChild, limitToLast, endAt, onDisconnect
} from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDV9tQXgzqxUayhvc384tTLOwy0QOEZVcU",
  authDomain: "chat-e6c93.firebaseapp.com",
  databaseURL: "https://chat-e6c93-default-rtdb.firebaseio.com",
  projectId: "chat-e6c93",
  storageBucket: "chat-e6c93.appspot.com",
  messagingSenderId: "131547791719",
  appId: "1:131547791719:web:2f567033f028810345afc2",
  measurementId: "G-VY49LNJJLG"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const chatRef = ref(db, 'whitet415/');
const typingRef = ref(db, 'whitet415_typing/');
const onlineRef = ref(db, 'whitet415_online/');

const PAGE_SIZE = 20;
let earliestTimestamp = null;
let loadingOlderMessages = false;
let loadedMessages = new Set();
let firstLoadDone = false;

document.addEventListener("DOMContentLoaded", async () => {
  const chatContainer = document.getElementById("chat-container");
  const userInput = document.getElementById("user-input");
  const typingIndicator = document.getElementById("typing-indicator");
  const newMessageBanner = document.getElementById("new-message");
  const fileInput = document.getElementById("fileInput");

  let currentUser = {
    username: "User",
    pfp: "/images/logo.png",
    role: "User",
    uid: null
  };

  try {
    const r = await fetch("/api/stats/user");
    if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`);
    const a = await r.json();
    if (a.success) {
      currentUser.username = a.user.username;
      currentUser.pfp = a.user.pfp;
      currentUser.role = a.user.role || "User";
      currentUser.uid = a.user.uid;

      const pfpImg = document.querySelector("#pfpimg");
      const usernameDrop = document.querySelector("#usernamedrop");

      if (pfpImg) pfpImg.src = currentUser.pfp;
      if (usernameDrop) {
        let displayUsername = currentUser.username;
        if (["Dev", "Admin", "Owner", "Co-Owner", "Artist", "Contributor"].includes(currentUser.role)) {
          displayUsername = `[${currentUser.role}] ${currentUser.username}`;
        }
        usernameDrop.textContent = displayUsername;
        switch (currentUser.role) {
          case 'Dev':
          case 'Admin':
            usernameDrop.style.color = 'rgb(137, 10, 10)';
            break;
          case 'Owner':
          case 'Co-Owner':
            usernameDrop.classList.add('rainbowText');
            break;
          case 'Artist':
            usernameDrop.style.color = 'rgb(11, 132, 84)';
            break;
          case 'Contributor':
            usernameDrop.style.color = 'rgb(94, 11, 132)';
            break;
          default:
            usernameDrop.style.color = 'black';
        }
      }
    } else throw new Error(a.error);
  } catch (err) {
    console.error("User info error:", err);
    window.location.replace("/login");
    return;
  }

  const userKey = currentUser.username.replace(/\W+/g, "_");
  const userStatusRef = ref(db, `whitet415_online/${userKey}`);

  setInterval(() => {
    set(userStatusRef, { username: currentUser.username, uid: currentUser.uid, role: currentUser.role, timestamp: Date.now() });
  }, 1000);
  onDisconnect(userStatusRef).remove();

  onValue(onlineRef, (snapshot) => {
  const users = Object.values(snapshot.val() || {});
  const drop = document.getElementById("online-users-dropdown");
  const nameDrop = document.getElementById("usersnamedrop");
  if (drop && nameDrop) {
    drop.innerHTML = "";
    
    users.forEach(u => {
  const item = document.createElement("a");
  item.className = "styles__profileDropdownOption___ljZXD-camelCase";
  item.href = `/stats?id=${encodeURIComponent(u.uid)}`;
  item.style.textDecoration = "none";
  item.style.color = "inherit";

  let roleText = "";
  let roleColor = "black";

  if (["Dev", "Admin", "Owner", "Co-Owner", "Artist", "Contributor"].includes(u.role)) {
    roleText = `[${u.role}] `;
  }

  switch (u.role) {
    case "Dev":
    case "Admin":
      roleColor = "rgb(137, 10, 10)";
      break;
    case "Owner":
    case 'Co-Owner':
      roleColor = null; 
      break;
    case "Artist":
      roleColor = "rgb(11, 132, 84)";
      break;
    case "Contributor":
      roleColor = "rgb(94, 11, 132)";
      break;
    default:
      roleColor = "black";
  }

  const coloredName = (u.role === "Owner" || u.role === "Co-Owner")
  ? `<span class="rainbowText" style="white-space: nowrap;">${escapeHtml(roleText)} ${escapeHtml(u.username)}</span>`
  : `<span style="color: ${roleColor}; white-space: nowrap;">${escapeHtml(roleText)} ${escapeHtml(u.username)}</span>`;

item.innerHTML = `
  <i class="fas fa-user styles__profileDropdownOptionIcon___15VKX-camelCase"></i>
  ${coloredName}
`;




  drop.appendChild(item);
});

    
    nameDrop.textContent = `${users.length} User${users.length !== 1 ? 's' : ''} Online`;

    if (users.length > 10) {
      drop.style.maxHeight = "300px";
      drop.style.overflowY = "auto";
    } else {
      drop.style.maxHeight = "unset";
      drop.style.overflowY = "unset";
    }
  }
});

  function pushTypingStatus(name) {
    const key = name.replace(/\W+/g, "_");
    set(ref(db, `whitet415_typing/${key}`), { username: name, timestamp: Date.now() });
  }

  function removeTypingStatus(name) {
    const key = name.replace(/\W+/g, "_");
    remove(ref(db, `whitet415_typing/${key}`));
  }

  let typingTimeout;
  userInput.addEventListener("input", () => {
    pushTypingStatus(currentUser.username);
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => removeTypingStatus(currentUser.username), 3000);
  });

  onValue(typingRef, (snapshot) => {
    const current = currentUser.username.toLowerCase();
    const typers = Object.values(snapshot.val() || {}).filter(u => u.username.toLowerCase() !== current).map(u => u.username);
    typingIndicator.textContent = typers.length === 0 ? "" :
      typers.length === 1 ? `${typers[0]} is typing...` :
      `${typers.slice(0, 2).join(", ")}${typers.length > 2 ? `, and ${typers.length - 2} more` : ""} are typing...`;
  });

  function sanitizeHtml(html) {
    const temp = document.createElement('div');
    temp.textContent = html;
    return temp.innerHTML
        .replace(/javascript:/gi, '')
        .replace(/on\w+="[^"]*"/gi, '');
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function formatTimestamp(iso) {
    const date = new Date(iso);
    const now = new Date();
    const yesterday = new Date();
    yesterday.setDate(now.getDate() - 1);
    const options = { hour: "numeric", minute: "2-digit", hour12: true };
    if (date.toDateString() === now.toDateString())
      return date.toLocaleTimeString(undefined, options);
    if (date.toDateString() === yesterday.toDateString())
      return `Yesterday at ${date.toLocaleTimeString(undefined, options)}`;
    return date.toLocaleString(undefined, {
      year: "2-digit",
      month: "numeric",
      day: "numeric",
      ...options,
    });
  }

  function isSafeDataURI(uri, type) {
    const validPrefix = `data:${type}/`;
    return (
      uri.startsWith(validPrefix) &&
      /^data:(image|audio|video)\/[a-zA-Z]+;base64,[A-Za-z0-9+/=]+$/.test(uri)
    );
  }

  function renderMessage(text) {
    const blockedDomains = [
      "iplogger","wl.gl","ed.tc","bc.ax","maper.info","2no.co","yip.su",
      "iplis.ru","ezstat.ru","iplog.co","iplogger.cn","grabify","hd.gd",
      "onbit.pro","snifferip.com","unl.one","urlto.me","location.cyou",
      "mymap.icu","mymap.quest","map-s.online","crypto-o.click","cryp-o.online",
      "account.beauty","photospace.life","photovault.store","imagehub.fun",
      "sharevault.cloud","xtube.chat","screensnaps.top","photovault.pics",
      "foot.wiki","gamergirl.pro","picshost.pics","pichost.pics","imghost.pics",
      "screenshare.pics","myprivate.pics","shrekis.life","screenshot.best",
      "gamingfun.me","stopify.co"
    ];
    const url = text.toLowerCase();
    if (blockedDomains.some((d) => url.includes(d))) return escapeHtml(text);

    if (isSafeDataURI(text, "image"))
      return `<img src="${text}" style="max-width: 300px; border-radius: 6px;" loading="lazy">`;
    if (isSafeDataURI(text, "video"))
      return `<video controls style="max-width: 300px;"><source src="${text}"></video>`;
    if (isSafeDataURI(text, "audio"))
      return `<audio controls><source src="${text}"></audio>`;

    const imgMatch = text.match(/(https?:\/\/[^\s]+\.(jpeg|jpg|gif|png|svg|webp|tiff|eps|bmp|avif|xcf|ico))/i);
    const vidMatch = text.match(/(https?:\/\/[^\s]+\.(avi|mov|mp4|ogg|wmv|mkv|mpg|flv|avchd|mpeg4|m2ts|webm))/i);
    const audMatch = text.match(/(https?:\/\/[^\s]+\.(mp3|wav|aac|pcm|m4a|m4p|opus|flac|dsd|gsm|wma|ogg))/i);

    if (imgMatch)
      return `<img src="${escapeHtml(imgMatch[0])}" style="max-width: 300px; border-radius: 6px;" loading="lazy">`;
    if (vidMatch)
      return `<video controls style="max-width: 300px;"><source src="${escapeHtml(vidMatch[0])}"></video>`;
    if (audMatch)
      return `<audio controls><source src="${escapeHtml(audMatch[0])}"></audio>`;

    return text.match(/^https?:\/\//)
      ? `<a href="${escapeHtml(text)}" target="_blank" rel="noopener noreferrer">${escapeHtml(text)}</a>`
      : escapeHtml(text);
  }

  function appendMessage(sender, text, timestamp, role, pfp, uid, prepend = false) {
    const formattedUsername = ["Dev", "Admin", "Owner", "Co-Owner", "Artist", "Contributor"].includes(role)
      ? `[${role}] ${sender}`
      : sender;

    let color = "black";
    if (["Dev", "Admin"].includes(role)) color = "rgb(137, 10, 10)";
    if (role === "Owner") color = "rainbowText";
    if (role === "Co-Owner") color = "rainbowText";
    if (role === "Artist") color = "rgb(11, 132, 84)";
    if (role === "Contributor") color = "rgb(94, 11, 132)";

    const mentionRegex = /@(\w+)/g;
    const currentName = currentUser.username.toLowerCase();
    let highlight = false;

    if (mentionRegex.test(text)) {
      const mentions = [...text.matchAll(mentionRegex)].map((m) => m[1].toLowerCase());
      if (mentions.includes(currentName) || mentions.includes("everyone")) highlight = true;
    }

    const renderedText = renderMessage(text).replace(mentionRegex, (_, m) => {
      const lowerM = m.toLowerCase();
      const isHighlight = (lowerM === currentName) || (lowerM === "everyone");
      return `<span style="color: blue; font-weight: bold; ${
        isHighlight ? "background: yellow; padding: 2px 4px; border-radius: 4px;" : ""
      }">@${escapeHtml(m)}</span>`;
    });

    if (highlight) {
      const pingSound = new Audio(
        "https://cdn.glitch.global/a6695a81-c90d-4020-ae20-474929cf2986/Blacket%20Reply%20SFX%20(mp3cut.net)%20(1).mp3"
      );
      pingSound.play().catch(() => {});
    }

    const coloredUsername = (role === "Owner" || role === "Co-Owner")
  ? `<span class="rainbowText" style="font-size: 1.2em; display: inline-block;">${escapeHtml(formattedUsername)}</span>`
  : `<span style="font-size: 1.2em; color: ${color};">${escapeHtml(formattedUsername)}</span>`;

const html = `
  <div class="chat-message" style="display: flex; align-items: flex-start; margin-bottom: 15px; gap: 10px;">
    <a href="/stats?id=${encodeURIComponent(uid)}" style="text-decoration:none; cursor:pointer;">
      <img src="${escapeHtml(pfp)}" style="width: 50px; height: 50px; border-radius: 0;">
    </a>
    <div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
        <a href="/stats?id=${encodeURIComponent(uid)}" style="text-decoration:none; color: inherit; cursor:pointer;">
          ${coloredUsername}
        </a>
        <span style="font-size: 0.85em; color: black;">${formatTimestamp(timestamp)}</span>
      </div>
      <span style="font-size: 1em; word-break: break-word; ${highlight ? "background: #fff3b0; padding: 5px; border-radius: 4px;" : ""}">
        ${renderedText}
      </span>
    </div>
  </div>
`;


    if (prepend) {
      const prevHeight = chatContainer.scrollHeight;
      chatContainer.insertAdjacentHTML("afterbegin", html);
      chatContainer.scrollTop += chatContainer.scrollHeight - prevHeight;
    } else {
      chatContainer.insertAdjacentHTML("beforeend", html);
      if (chatContainer.scrollTop + chatContainer.clientHeight + 100 >= chatContainer.scrollHeight) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
        newMessageBanner.style.display = "none";
      } else {
        newMessageBanner.style.display = "block";
      }
    }
  }

  async function loadMessages(initial = false) {
    if (loadingOlderMessages) return;
    loadingOlderMessages = true;

    let q;
    if (initial) {
      q = query(chatRef, orderByChild("timestamp"), limitToLast(PAGE_SIZE));
    } else if (earliestTimestamp) {
      q = query(chatRef, orderByChild("timestamp"), endAt(earliestTimestamp), limitToLast(PAGE_SIZE + 1));
    } else {
      loadingOlderMessages = false;
      return;
    }

    const snapshot = await new Promise(resolve => onValue(q, resolve, { onlyOnce: true }));
    const data = snapshot.val();
    if (!data) {
      loadingOlderMessages = false;
      return;
    }

    const messages = Object.entries(data).map(([id, msg]) => ({ id, ...msg }));
    messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    if (!initial) messages.pop();

    messages.forEach((msg) => {
      if (!loadedMessages.has(msg.id)) {
        appendMessage(msg.username, msg.text, msg.timestamp, msg.role, msg.pfp, msg.uid, !initial);
        loadedMessages.add(msg.id);

        if (!earliestTimestamp || new Date(msg.timestamp) < new Date(earliestTimestamp)) {
          earliestTimestamp = msg.timestamp;
        }
      }
    });

    if (initial) {
      requestAnimationFrame(() => {
        setTimeout(() => {
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 50);
      });

      firstLoadDone = true;
      if (messages.length > 0) {
        earliestTimestamp = messages[0].timestamp;
      }
    }

    loadingOlderMessages = false;
  }

  onChildAdded(chatRef, (snapshot) => {
    const msg = snapshot.val();
    if (!loadedMessages.has(snapshot.key) && firstLoadDone) {
      appendMessage(msg.username, msg.text, msg.timestamp, msg.role, msg.pfp, msg.uid);
      loadedMessages.add(snapshot.key);
    }
  });

  chatContainer.addEventListener("scroll", () => {
    if (chatContainer.scrollTop < 100 && !loadingOlderMessages) loadMessages(false);
  });

  newMessageBanner.addEventListener("click", () => {
    chatContainer.scrollTop = chatContainer.scrollHeight;
    newMessageBanner.style.display = "none";
  });

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    const message = {
      text,
      username: currentUser.username,
      pfp: currentUser.pfp,
      role: currentUser.role,
      uid: currentUser.uid,
      timestamp: new Date().toISOString()
    };

    try {
      await push(chatRef, message);
      userInput.value = '';
      removeTypingStatus(currentUser.username);
    } catch (err) {
      console.error("Send failed:", err);
    }
  }

  userInput.addEventListener("keypress", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  fileInput?.addEventListener("change", (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async (e) => {
      const message = {
        text: e.target.result,
        username: currentUser.username,
        pfp: currentUser.pfp,
        role: currentUser.role,
        uid: currentUser.uid,
        timestamp: new Date().toISOString()
      };
      try {
        await push(chatRef, message);
      } catch (err) {
        console.error("Error sending media message:", err);
      }
    };
    reader.readAsDataURL(file);
  });

  loadMessages(true);
});
</script>
