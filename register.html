<!DOCTYPE html>
<html>
  <head>

      src="https://code.jquery.com/jquery-3.6.3.min.js
    "

    ></script>
    <script src="/scripts/themes.js"></script>
    <script defer src="/js/sendregister.js"></script>
    <link
      rel="stylesheet"
      href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="shortcut icon" href="/images/logo.png" />
    <title>Register | Whitet</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <script src="scripts/themes.js" defer></script>
    <script src="scripts/preload.js"></script>
  </head>

  <body>
    <div class="preloader">
      <img
        src="images/logo.png"
        alt="Preloader Image"
        class="preloader-image"
      />
    </div>
    <div class="navigation-line">
      <a class="styles__blooketText___1pMBG-camelCase" href="/">Whitet</a
      ><a class="styles__headerRight___nPb83-camelCase" href="/login">Login</a>
    </div>
    <form class="center-square">
      <div class="styles__containerHeader___19fyc-camelCase">Register</div>
      <div
        class="styles__inputContainer___t9pz0-camelCase styles__inputFilled___3FO6M-camelCase"
      >
        <i
          class="styles__icon___358UQ-camelCase fas fa-user styles__iconFilled___1uSeW-camelCase"
          aria-hidden="true"
        ></i>
        <input
          class="styles__input___2XTSp-camelCase"
          id="username"
          placeholder="Username"
          type="text"
          autocomplete="username"
          value=""
          fdprocessedid="2hrp7"
        />
      </div>
      <div
        class="styles__inputContainer___t9pz0-camelCase styles__inputFilled___3FO6M-camelCase"
      >
        <i
          class="styles__icon___358UQ-camelCase fas fa-lock styles__iconFilled___1uSeW-camelCase"
          style="font-size: 23px"
          aria-hidden="true"
        ></i>
        <input
          class="styles__input___2XTSp-camelCase"
          id="password"
          placeholder="Password"
          type="password"
          autocomplete="current-password"
          value=""
          fdprocessedid="6mp2xv"
        />
      </div>

      <div
        onclick="register()"
        id="resbtn"
        class="styles__button___2hNZo-camelCase styles__buttonFilled___23Dcn-camelCase"
        tabindex="0"
        style="display: flex; justify-content: center; align-items: center"
      >
        Register

    </form>
    <div class="styles__background___2J-JA-camelCase">
      <div
        class="styles__blooksBackground___3oQ7Y-camelCase"
        style="
          background-image: url('/images/ui7.png');
          animation: animatedBackground 9s linear infinite;
          -moz-animation: animatedBackground 9s linear infinite;
          -webkit-animation: animatedBackground 9s linear infinite;
          -ms-animation: animatedBackground 9s linear infinite;
          -o-animation: animatedBackground 9s linear infinite;
        "
      ></div>
    </div>
    <script src="/scripts/signup.js"></script>

</html>
