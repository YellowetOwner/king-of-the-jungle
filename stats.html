    :root {
      --card-width: 540px;
      --card-height: 220px;
    }
    .music-player-container * {
      box-sizing: border-box;
    }
    .music-player-container {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    .search-container {
      position: relative;
      width: 100%;
      margin-bottom: 15px;
      z-index: 100;
    }
    .search-input {
      width: 100%;
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.25);
      color: #fff;
      outline: none;
      transition: all 0.2s ease;
      backdrop-filter: blur(5px);
    }
    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    .search-input:focus {
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    }
    .search-results {
      position: absolute;
      top: 42px;
      left: 0;
      width: 100%;
      max-height: 250px;
      background: rgba(30, 30, 30, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
      z-index: 99;
    }
    .search-results.active {
      opacity: 1;
      visibility: visible;
    }
    .result-item {
      display: flex;
      align-items: center;
      padding: 10px 15px;
      cursor: pointer;
      transition: background 0.2s;
      overflow: hidden;
    }
    .result-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .result-img {
      width: 45px;
      height: 45px;
      border-radius: 6px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .result-img img { width: 100%; height: 100%; object-fit: cover; }
    .result-info { flex: 1; }
    .result-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-artist { font-size: 13px; opacity: 0.7; }
    .player {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 0 0 0;
    }
    .album-art {
      flex: 0 0 180px;
      height: 180px;
      border-radius: 12px;
      overflow: hidden;
    }
    .album-art img { width: 100%; height: 100%; object-fit: cover; }
    .info {
      flex: 1; display: flex; flex-direction: column; justify-content: center;
      text-shadow: 0px 0px 12px rgba(0, 0, 0, 0.3);
      min-width: 0;
    }
    .track-title {
      font-size: 24px; font-weight: 700; margin-bottom: 4px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .artist {
      font-size: 16px; opacity: 0.75; margin-bottom: 15px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
    }
    .controls { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }
    .controls i { font-size: 28px; cursor: pointer; transition: 0.12s ease; }
    .controls i:active { transform: scale(0.94); }
    .seekbar { height: 6px; background: rgba(255, 255, 255, 0.25); border-radius: 6px; position: relative; cursor: pointer; transition: height 0.2s ease; }
    .seekbar.active { height: 8px; }
    #progress { height: 100%; width: 0%; background: #fff; border-radius: 3px; }
    .timecodes { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.7; margin-top: 4px; }
    #ytPlayer { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; }
    .loading { text-align: center; padding: 20px; color: rgba(255, 255, 255, 0.7); }
    .search-results::-webkit-scrollbar { width: 6px; }
    .search-results::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 3px; }
    .search-results::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; }
    .control-btn.repeat-active { color: #3b82f6; }
  </style>

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            async function updateStats() {
              try {
                const params = new URLSearchParams(location.search);
                const uid = params.get("id");
                const res = await fetch(uid ? `/api/stats/view?uid=${encodeURIComponent(uid)}` : `/api/stats/user`);
                const data = await res.json();
                const username = data?.user?.username;
                if (!username) return;
                let messagesCount = 0, postsCount = 0, likesCount = 0;
                const messagesSnapshot = await get(ref(db, "whitet415"));
                if (messagesSnapshot.exists()) {
                  messagesSnapshot.forEach(child => {
                    const msg = child.val();
                    if (msg.username === username) messagesCount++;
                  });
                }
                const postsSnapshot = await get(ref(db, "whitet415-posts"));
                if (postsSnapshot.exists()) {
                  postsSnapshot.forEach(child => {
                    const post = child.val();
                    let postUser = "";
                    if (typeof post.user === "string") postUser = post.user;
                    else if (typeof post.user === "object") postUser = post.user.username || "";
                    if (postUser === username) {
                      postsCount++;
                      if (Array.isArray(post.likes)) likesCount += post.likes.length;
                    }
                  });
                }
                const messagesEl = document.getElementById("messages"); if (messagesEl) messagesEl.textContent = messagesCount;
                const postsEl = document.getElementById("posts"); if (postsEl) postsEl.textContent = postsCount;
                const likesEl = document.getElementById("likes"); if (likesEl) likesEl.textContent = likesCount;
              } catch {}
            }
            updateStats();

        <script>
          const YT_KEY = "AIzaSyDkXj66lPy0lC7sRrGfXzFk7dww0c_jkg0"; // IMPORTANT: This key is public and can be abused.
          const YT_EP = "https://www.googleapis.com/youtube/v3/search?part=snippet&q=";
          const SEARCH_EP = "https://itunes.apple.com/search?term=";

          // Get Elements
          const searchInput = document.getElementById("searchInput");
          const searchResults = document.getElementById("searchResults");
          const trackTitle = document.getElementById("trackTitle");
          const artistName = document.getElementById("artistName");
          const albumCover = document.getElementById("albumCover");
          const playPauseBtn = document.getElementById("playPause");
          const seekBar = document.getElementById("seekbar");
          const progressBar = document.getElementById("progress");
          const currentTimeSpan = document.getElementById("currentTime");
          const remainingTimeSpan = document.getElementById("remainingTime");
          const repeatBtn = document.getElementById("repeatBtn");
          const skipBackBtn = document.getElementById("skipBack");
          const skipForwardBtn = document.getElementById("skipForward");
          
          let isRepeating = false, player, isPlaying = false, isDragging = false, searchTimeout;
          let skipTime = 10;
          let currentTrack = {
            title: "Not Playing",
            artist: "Search for a song",
            artwork: "https://files.catbox.moe/zh75fa.png",
          };
          
          const tag = document.createElement("script");
          tag.src = "https://www.youtube.com/iframe_api";
          const firstScriptTag = document.getElementsByTagName("script")[0];
          firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
          
          function onYouTubeIframeAPIReady() {
            player = new YT.Player("ytPlayer", {
              height: "1", width: "1", videoId: "", host: 'https://www.youtube-nocookie.com',
              playerVars: { playsinline: 1, enablejsapi: 1, modestbranding: 1, rel: 0, showinfo: 0 },
              events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange },
            });
          }
          
          function onPlayerReady(event) {
            playPauseBtn.addEventListener("click", togglePlayback);
            repeatBtn.addEventListener("click", toggleRepeat);
            skipBackBtn.addEventListener("click", () => skip(-skipTime));
            skipForwardBtn.addEventListener("click", () => skip(skipTime));
            seekBar.addEventListener("mousedown", startSeek);
            document.addEventListener("mousemove", dragSeek);
            document.addEventListener("mouseup", endSeek);
            setInterval(updateProgress, 500);
          }
          
          function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
              isPlaying = true;
              playPauseBtn.className = "fa-solid fa-pause fa-lg control-btn";
            } else if (event.data === YT.PlayerState.PAUSED) {
              isPlaying = false;
              playPauseBtn.className = "fa-solid fa-play fa-lg control-btn";
            } else if (event.data === YT.PlayerState.ENDED) {
              if (isRepeating) {
                player.seekTo(0);
                player.playVideo();
              } else {
                isPlaying = false;
                playPauseBtn.className = "fa-solid fa-play fa-lg control-btn";
              }
            }
          }

          function toggleRepeat() {
            isRepeating = !isRepeating;
            repeatBtn.classList.toggle("repeat-active", isRepeating);
          }

          function skip(seconds) {
            if (!player || !player.getCurrentTime) return;
            const currentTime = player.getCurrentTime();
            player.seekTo(currentTime + seconds, true);
          }

          function togglePlayback() {
            if (!player || !player.playVideo) return;
            isPlaying ? player.pauseVideo() : player.playVideo();
          }
          
          function startSeek(e) { isDragging = true; seekBar.classList.add("active"); updateSeekPosition(e); }
          function dragSeek(e) { if (isDragging) { updateSeekPosition(e); } }
          function endSeek() { if (isDragging) { isDragging = false; seekBar.classList.remove("active"); } }
          
          function updateSeekPosition(e) {
            if (!player || !player.getDuration) return;
            const rect = seekBar.getBoundingClientRect();
            const percent = Math.min(Math.max((e.clientX - rect.left) / rect.width, 0), 1);
            progressBar.style.width = percent * 100 + "%";
            player.seekTo(percent * player.getDuration(), true);
          }
          
          function updateProgress() {
            if (!player || !player.getDuration || isDragging) return;
            const duration = player.getDuration() || 0;
            const currentTime = player.getCurrentTime() || 0;
            progressBar.style.width = (currentTime / duration) * 100 + "%";
            currentTimeSpan.textContent = formatTime(currentTime);
            remainingTimeSpan.textContent = "-" + formatTime(duration - currentTime);
          }
          
          function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60).toString().padStart(2, "0");
            return `${minutes}:${secs}`;
          }

          searchInput.addEventListener("input", () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
              const query = searchInput.value.trim();
              query.length > 1 ? searchSongs(query) : hideSearchResults();
            }, 300);
          });
          
          searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              clearTimeout(searchTimeout);
              const query = searchInput.value.trim();
              if (query.length > 1) searchSongs(query);
            }
          });
          
          function searchSongs(query) {
            searchResults.innerHTML = '<div class="loading">Searching...</div>';
            showSearchResults();
            fetch(`${SEARCH_EP}${encodeURIComponent(query)}&media=music&limit=7`)
              .then(res => res.json())
              .then(data => displaySearchResults(data.results))
              .catch(err => {
                console.error("Error searching iTunes:", err);
                searchResults.innerHTML = '<div class="loading">Search failed.</div>';
              });
          }
          
          function displaySearchResults(results) {
            if (!results || results.length === 0) {
              searchResults.innerHTML = '<div class="loading">No results found</div>';
              return;
            }
            searchResults.innerHTML = "";
            results.forEach(item => {
              if (!item.trackName || !item.artistName) return;
              const resultElement = document.createElement("div");
              resultElement.className = "result-item";
              resultElement.innerHTML = `
                <div class="result-img"><img src="${item.artworkUrl100}" alt="${item.trackName}" crossorigin="anonymous"></div>
                <div class="result-info">
                  <div class="result-title">${item.trackName}</div>
                  <div class="result-artist">${item.artistName}</div>
                </div>`;
              resultElement.addEventListener("click", () => {
                playSong(item.trackName, item.artistName, item.artworkUrl100);
                hideSearchResults();
                searchInput.value = "";
              });
              searchResults.appendChild(resultElement);
            });
          }
          
          function showSearchResults() { searchResults.classList.add("active"); }
          function hideSearchResults() { searchResults.classList.remove("active"); }

          function playSong(title, artist, artwork) {
            trackTitle.textContent = title;
            artistName.textContent = artist;
            const highResArtwork = artwork.replace("100x100", "600x600");
            albumCover.src = highResArtwork;
            
            currentTrack = { title: title, artist: artist, artwork: artwork };
            getYT(`${title} - ${artist} audio`);
          }
          
          function getYT(query) {
            fetch(`${YT_EP}${encodeURIComponent(query)}&type=video&key=${YT_KEY}&maxResults=1`)
              .then(res => res.json())
              .then(data => {
                if (data.items && data.items.length > 0) loadVid(data.items[0].id.videoId);
              })
              .catch(err => console.error("Error searching YouTube:", err));
          }
          
          function loadVid(videoId) {
            if (player && player.loadVideoById) {
              player.loadVideoById(videoId);
              player.playVideo();
              player.unMute();
            }
          }

          document.addEventListener("click", (e) => {
            if (!searchResults.contains(e.target) && e.target !== searchInput) {
              hideSearchResults();
            }
          });
        </script>

    </body>
</html>
