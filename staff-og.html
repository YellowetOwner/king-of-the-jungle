const blookCost = document.querySelector('#blookCost');
const blookRarity = document.querySelector('#blookRarity');
const blookURL = document.querySelector('#blookURL');
const blookSubmit = document.querySelector('#blookSubmit');
function createUserRow(name, idSuffix) {
			const row = document.createElement("div");
			Object.assign(row.style, {
				display: "flex",
				alignItems: "center",
				justifyContent: "space-between",
				marginBottom: "10px",
				borderRadius: "7px",
				backgroundColor: "#616161",
				color: "#fff",
				padding: "10px",
				boxShadow: "0px -5px rgba(0, 0, 0, 0.2) inset, 0px 0px 4px rgba(0, 0, 0, 0.15)"
			});
			const img = document.createElement("img");
			img.src = "images/logo.png";
			img.style.width = "50px";
			img.style.height = "50px";
			img.style.borderRadius = "5px";
			img.style.marginRight = "10px";
			const username = document.createElement("span");
			username.innerText = name;
			username.style.fontSize = "16px";
			username.style.marginLeft = "10px";
			const userInfo = document.createElement("div");
			userInfo.style.display = "flex";
			userInfo.style.alignItems = "center";


			function makeIconButton(id, iconClass, hoverColor) {
				const btn = document.createElement("button");
				btn.id = id;
				btn.innerHTML = `<i class="${iconClass}"></i>`;
				Object.assign(btn.style, {
					backgroundColor: "#444",
					border: "none",
					color: "#fff",
					padding: "5px",
					borderRadius: "3px",
					display: "flex",
					alignItems: "center",
					marginLeft: id.endsWith("edit") ? "0px" : "5px"
				});
				btn.onmouseover = () => (btn.style.backgroundColor = hoverColor);
				btn.onmouseout = () => (btn.style.backgroundColor = "#444");
				return btn;
			}
			const editBtn = makeIconButton(`editUser${idSuffix}`, "fas fa-edit", "green");
			const deleteBtn = makeIconButton(`deleteUser${idSuffix}`, "fas fa-trash", "red");
			const infoBtn = makeIconButton(`infoUser${idSuffix}`, "fas fa-info-circle", "blue");
			userInfo.append(editBtn, deleteBtn, infoBtn);
			row.append(img, username, userInfo);
			return row;
		}
function createUserContainer(name, suffix){
    	const userContainer = document.createElement("div");
		userContainer.className = "userContainer";
		userContainer.id = "WIP";
		userContainer.style.padding = "20px";
		userContainer.style.width = "100%";
		const topBar = document.createElement("div");
		topBar.style.display = "flex";
		topBar.style.alignItems = "center";
		topBar.style.justifyContent = "space-between";
		topBar.style.marginBottom = "10px";
		const backButton = document.createElement("button");
		backButton.innerHTML = `<i class="fas fa-arrow-left" style="margin-right: 5px;"></i>Back`;
		backButton.onclick = () => location.reload();
		Object.assign(backButton.style, {
			backgroundColor: "#616161",
			color: "#fff",
			border: "none",
			outline: "none",
			padding: "5px 10px",
			borderRadius: "7px",
			fontSize: "15px",
			cursor: "pointer",
			display: "flex",
			alignItems: "center",
			paddingBottom: "5px",
			boxShadow: "0px -5px rgba(0, 0, 0, 0.2) inset, 0px 0px 4px rgba(0, 0, 0, 0.15)",
			textAlign: "center",
			textDecoration: "none",
			userSelect: "none",
			transition: "200ms",
			marginRight: "auto"
		});
		const filler1 = document.createElement("div");
		filler1.style.width = "200px";
		const filler2 = document.createElement("div");
		filler2.style.width = "100px";
		topBar.append(backButton, filler1, filler2);
		userContainer.appendChild(topBar);
		return userContainer;
}
async function showUsers() {
    const usersList = await getUsers();
    const userContainer = createUserContainer();
    usersList.forEach(user=>{
        userContainer.appendChild(createUserRow(user.name,0));
    });
}
