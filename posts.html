<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Posts | Whitet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <script src="https://code.jquery.com/jquery-3.6.3.min.js" type="text/javascript"></script>
  <script src="/scripts/all.js"></script>
  <script src="/scripts/news.js"></script>
  <script src="/scripts/themes.js"></script>
  <script defer src="/scripts/posts.js"></script>
  <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="shortcut icon" href="/images/logo.png" />
</head>

<body>
  <div class="styles__background___2J-JA-camelCase">
    <div class="styles__blooksBackground___3oQ7Y-camelCase" style="
      background-image: url('/images/ui7.png');
      animation: animatedBackground 9s linear infinite;
    "></div>
  </div>

  <div class="styles__mNavBar___1OUuw-camelCase">
    <a href="/" class="styles__blooketText___1pMBG-camelCase">Whitet</a>
    <i class="fas fa-bars styles__mHamburgerIcon___2Q8oG-camelCase" id="hamburgerToggle"></i>
  </div>

  <div class="styles__mSidebar___3J45k-camelCase" id="mobileSidebar">
    <i class="fas fa-times styles__closeIcon___39zL7-camelCase" id="closeSidebar"></i>
    <div class="nothin"></div>
    <div class="styles__bottomRow___3OozA-camelCase"></div>
  </div>

  <div class="styles__topRightRow___dQvxc-camelCase">
    <div class="styles__profileContainer___CSuIE-camelCase" role="button" tabindex="0">
      <div class="styles__profileRow___cJa4E-camelCase">
        <div style="position: relative;" class="styles__blookContainer___36LK2-camelCase styles__profileBlook___37mfP-camelCase">
          <img src="images/logo.png" id="pfpimg" draggable="false" class="styles__blook___1R6So-camelCase" />
        </div>
        <span class="usertxt" id="usernamedrop">user</span>
      </div>
      <i class="fas fa-angle-down styles__profileDropdownIcon___3iLIX-camelCase" aria-hidden="true"></i>
      <div class="styles__profileDropdownMenu___2jUAA-camelCase">
        <a class="styles__profileDropdownOption___ljZXD-camelCase" href="/logout">
          <i class="fas fa-sign-out-alt styles__profileDropdownOptionIcon___15VKX-camelCase" aria-hidden="true"></i>Logout
        </a>
      </div>
    </div>
  </div>

  <div class="styles__sidebar___1XqWi-camelCase">
    <a href="/" class="styles__blooketText___1pMBG-camelCase">Whitet</a>
    <div class="nothin"></div>
    <div class="styles__bottomRow___3OozA-camelCase"></div>
  </div>

  <div id="explaination" class="explaination">Read Stories, Share Info, and Have Fun!</div>

  <a data-tip="Create" class="styles__smallButton___sQuq8-camelCase" href="/create"><i class="styles__bottomIcon___3FswG-camelCase fas fa-plus"></i></a>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDV9tQXgzqxUayhvc384tTLOwy0QOEZVcU",
      authDomain: "chat-e6c93.firebaseapp.com",
      databaseURL: "https://chat-e6c93-default-rtdb.firebaseio.com",
      projectId: "chat-e6c93",
      storageBucket: "chat-e6c93.appspot.com",
      messagingSenderId: "131547791719",
      appId: "1:131547791719:web:2f567033f028810345afc2",
      measurementId: "G-VY49LNJJLG"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.innerText = text || '';
      return div.innerHTML;
    }

    async function getUsername() {
      try {
        const res = await fetch("/api/stats/user");
        if (!res.ok) throw new Error("Failed to fetch");
        const data = await res.json();
        return data.user?.username || "user";
      } catch {
        return "user";
      }
    }

    async function initPosts() {
      const container = document.querySelector(".explaination");
      if (!container) return;

      const currentUsername = await getUsername();
      const postsRef = db.ref("whitet415-posts");

      postsRef.on("value", snapshot => {
        const posts = snapshot.val();
        if (!posts) return;

        const nearBottom = Math.abs(container.scrollHeight - container.scrollTop - container.clientHeight) < 100;
        const oldScrollTop = container.scrollTop;

        container.querySelectorAll('.postbackground').forEach(post => post.remove());

        Object.entries(posts).reverse().forEach(([postId, post]) => {
          const safeTitle = escapeHtml(post.title);
          const safeBody = escapeHtml(post.body);

          let username = "user";
          let uid = "";
          if (typeof post.user === "string") {
            username = escapeHtml(post.user);
          } else if (typeof post.user === "object") {
            username = escapeHtml(post.user.username || "user");
            uid = post.user.uid || "";
          }

          const likesArray = post.likes || [];
          const likeCount = likesArray.length;
          const likedByUser = likesArray.includes(currentUsername);
          const heartColor = likedByUser ? "red" : "white";

          const postDiv = document.createElement("div");
          postDiv.classList.add("postbackground");
          postDiv.style.color = "#fff";
          postDiv.id = postId;

          const authorLink = uid ? `/stats?id=${encodeURIComponent(uid)}` : "#";

          postDiv.innerHTML = `
            <h1>${safeTitle}</h1>
            <text class="usertextpost">
              Author: <a style="color:black" href="${authorLink}">${username}</a>
            </text><br>
            <i id="${postId}1" style="color: ${heartColor}; font-size:25px; cursor:pointer;" onclick="like('${postId}', '${currentUsername}')" class="fas fa-heart"></i>
            <text class="${postId}" style="font-size:25px"> ${likeCount}</text>
            <p>${safeBody}</p>
          `;

          container.appendChild(postDiv);
        });

        if (nearBottom) {
          container.scrollTop = container.scrollHeight;
        } else {
          container.scrollTop = oldScrollTop;
        }
      });
    }

    async function like(postId, username) {
      const heart = document.getElementById(`${postId}1`);
      const countText = document.querySelector(`.${postId}`);
      if (!heart || !countText) return;

      const postLikesRef = firebase.database().ref(`whitet415-posts/${postId}/likes`);

      try {
        const snapshot = await postLikesRef.once('value');
        let likes = snapshot.val() || [];

        if (likes.includes(username)) {
          likes = likes.filter(name => name !== username);
          heart.style.color = "white";
        } else {
          likes.push(username);
          heart.style.color = "red";
        }

        await postLikesRef.set(likes);
        countText.innerText = ` ${likes.length}`;
      } catch (err) {
        console.error("Failed to update likes:", err);
      }
    }

    document.addEventListener("DOMContentLoaded", initPosts);
  </script>
</body>
</html>
